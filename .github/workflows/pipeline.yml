name: Tubería Automatizada de Inversión Cuantitativa (Diaria)

on:
  schedule:
    - cron: '0 10 * * *' # 🔥 Se ejecuta TODOS LOS DÍAS a las 10:00 AM UTC
  workflow_dispatch: # Permite ejecución manual desde la web móvil de GitHub

jobs:
  run-quant-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonando Infraestructura del Repositorio
        uses: actions/checkout@v3

      - name: Desplegando Entorno Python de Producción
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalando Paquetes Científicos e Inteligencia Artificial
        run: pip install -r requirements.txt

      - name: Ejecutando Motor Predictivo y Extracción del Top 10
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py

      - name: Actualizando Base de Datos de Operaciones Registradas
        run: |
          git config --global user.name "QuantSyndicateBot"
          git config --global user.email "syndicate-bot@github.com"
          
          if [ -f predicciones_auditadas.csv ]; then
            git add predicciones_auditadas.csv
            git commit -m "🤖 [Top 10 Diario] Nuevas posiciones cuantitativas validadas por Kelly" && git push || echo "El archivo existe pero no contiene cambios nuevos hoy."
          else
            echo "📉 No se generó el archivo de predicciones porque el mercado está eficiente."
          fi
